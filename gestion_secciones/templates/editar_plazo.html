<!DOCTYPE html>
<html>
<head>

<title>Editar plazo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
margin:20px;
background:#f4f4f4;
}

.tarjeta{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#1a252f;
}

.error{
color:red;
margin-top:10px;
}

.volver{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#333;
}

</style>

</head>

<body>

<div class="tarjeta">

<h2>{{ plazo.nombre_plazo }}</h2>

{% if error %}
<p class="error">
Debe ingresar un radicado de 16 caracteres y la fecha cuando el plazo esté cumplido.
</p>
{% endif %}

<form method="post">

{% csrf_token %}

<label>Estado</label>

<select name="estado">

<option value="Pendiente" {% if plazo.estado == "Pendiente" %}selected{% endif %}>
Pendiente
</option>

<option value="En proceso" {% if plazo.estado == "En proceso" %}selected{% endif %}>
En proceso
</option>

<option value="Cumplido" {% if plazo.estado == "Cumplido" %}selected{% endif %}>
Cumplido
</option>

</select>

<label>Radicado (16 caracteres)</label>

<input 
type="text" 
name="radicado" 
value="{{ plazo.radicado }}" 
maxlength="16">

<label>Fecha de cumplimiento</label>

<input 
type="date" 
name="fecha_cumplimiento"
value="{{ plazo.fecha_cumplimiento|date:'Y-m-d' }}">

<button type="submit">
Guardar cambios
</button>

</form>

</div>

<a class="volver" href="/seccion/{{ plazo.seccion.id }}">
← Volver a la sección
</a>

</body>
</html>
